{% extends "_base.html" %}
{% block title %}Two-factor verification{% endblock %}

{% block content %}
<article>
    <header>
        <h1>Two-factor verification</h1>
        <p>Enter the 6-digit code from your authenticator app to continue.</p>
    </header>

    <form method="post" action="{% url 'two_factor_verify' %}">
        {% csrf_token %}
        <label for="token">Verification code</label>
        <input
            type="text"
            id="token"
            name="token"
            inputmode="numeric"
            autocomplete="one-time-code"
            pattern="[0-9]*"
            maxlength="6"
            required
            autofocus
        >
        <button type="submit">Verify</button>
    </form>

    <footer>
        <p>
            <a href="{% url 'logout' %}">Sign out</a>
        </p>
    </footer>
</article>
{% endblock %}
